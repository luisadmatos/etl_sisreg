version: "3.9"

services:
  postgres:
    image: postgres:16
    container_name: sisreg-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: sisreg
    ports:
      - "5432:5432"
    volumes:
      - sisreg_pg_data:/var/lib/postgresql/data

volumes:
  sisreg_pg_data: